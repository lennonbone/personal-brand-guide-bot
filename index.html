<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personal Brand Guide · Stop the Starving Artist</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #f1e9da;
    --cream-2: #faf5ec;
    --charcoal: #2b2a28;
    --terracotta: #cd6b52;
    --teal: #8fb6b1;
    --gold: #f0d488;
    --muted: #7a7468;
    --line: #e1d6c2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Raleway", system-ui, sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    height: 100vh;
    overflow: hidden;
  }
  .serif { font-family: "Playfair Display", Georgia, serif; }

  .wrap { display: flex; flex-direction: column; height: 100vh; max-width: 820px; margin: 0 auto; }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cream-2);
  }
  header .kicker { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); }
  header h1 { margin: 3px 0 0; font-size: 19px; font-weight: 600; font-family: "Playfair Display", serif; }
  .hdr-btns { display: flex; gap: 8px; }
  #backBtn, #startOver {
    background: transparent; border: 1px solid var(--line); color: var(--muted);
    border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: "Raleway", sans-serif;
  }
  #backBtn:hover:not(:disabled), #startOver:hover { border-color: var(--terracotta); color: var(--terracotta); }
  #backBtn:disabled { opacity: .4; cursor: not-allowed; }

  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }

  .msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.55; font-size: 15px; white-space: pre-wrap; }
  .msg.bot { background: var(--cream-2); border: 1px solid var(--line); border-bottom-left-radius: 4px; align-self: flex-start; }
  .msg.user { background: var(--terracotta); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
  .msg.notice { align-self: center; background: transparent; color: var(--muted); font-size: 13px; }
  .msg.notice button {
    border: none; border-radius: 999px; padding: 11px 22px; font-weight: 700; font-size: 14px;
    background: var(--terracotta); color: #fff; cursor: pointer; font-family: "Raleway", sans-serif;
  }

  .typing { display: inline-flex; gap: 4px; }
  .typing span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity: .25; } 40% { opacity: 1; } }

  form { display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--line); background: var(--cream-2); }
  textarea {
    flex: 1; resize: none; border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; font-family: inherit; font-size: 15px; background: #fff; color: var(--charcoal);
    max-height: 140px;
  }
  textarea:focus { outline: 2px solid var(--teal); }
  #send {
    border: none; border-radius: 12px; padding: 0 22px; font-weight: 700; font-size: 15px;
    background: var(--charcoal); color: #fff; cursor: pointer; font-family: "Raleway", sans-serif;
  }
  #send:disabled { opacity: .45; cursor: not-allowed; }

  /* ---------- Guide overlay ---------- */
  #guideView { position: fixed; inset: 0; background: rgba(20,18,16,.55); display: none; align-items: flex-start; justify-content: center; overflow-y: auto; z-index: 50; padding: 30px 14px; }
  #guideCard { background: #fff; max-width: 780px; width: 100%; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden; }
  .guideBar { position: sticky; top: 0; background: var(--charcoal); color: #fff; padding: 13px 22px; display: flex; justify-content: space-between; align-items: center; z-index: 2; }
  .guideBar span { font-size: 13px; letter-spacing: 1px; color: #d9d3c7; }
  .guideBar .acts { display: flex; gap: 8px; }
  .guideBar button { padding: 8px 14px; font-size: 13px; border-radius: 8px; cursor: pointer; font-family: "Raleway", sans-serif; font-weight: 600; }
  .guideBar .primary { background: var(--terracotta); color: #fff; border: none; }
  .guideBar .ghost { background: transparent; border: 1px solid rgba(255,255,255,.35); color: #fff; }

  /* ---------- The branded document (this is what prints to PDF) ---------- */
  #guideDoc { background: #fff; }
  .doc-head {
    background: var(--charcoal); color: #fff; padding: 12px 40px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 3px solid var(--terracotta);
  }
  .doc-head .brand { font-family: "Playfair Display", serif; font-style: italic; color: var(--gold); font-size: 15px; }
  .doc-head .tag { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #c9c3b7; }
  .doc-body { padding: 36px 48px 28px; }
  .doc-foot { border-top: 1px solid var(--line); margin: 0 48px; padding: 14px 0 26px; text-align: center; font-size: 11px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }

  #guideDoc h1 { font-family: "Playfair Display", serif; font-weight: 600; font-size: 30px; color: var(--terracotta); margin: 0 0 4px; }
  #guideDoc h1 + p, #guideDoc h1 + h2 { margin-top: 18px; }
  #guideDoc h2 { font-family: "Playfair Display", serif; font-weight: 600; font-size: 20px; color: var(--charcoal); margin: 28px 0 8px; padding-bottom: 6px; border-bottom: 2px solid var(--gold); }
  #guideDoc h3 { font-family: "Raleway", sans-serif; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; color: var(--terracotta); margin: 18px 0 4px; }
  #guideDoc p, #guideDoc li { font-size: 14px; line-height: 1.65; color: #38352f; }
  #guideDoc ul { padding-left: 20px; }
  #guideDoc strong { color: var(--charcoal); }

  /* Keep blocks whole so the PDF never slices a line across a page break */
  #guideDoc p, #guideDoc li, #guideDoc h1, #guideDoc h2, #guideDoc h3,
  .doc-head, .doc-foot {
    page-break-inside: avoid;
    break-inside: avoid;
  }
  #guideDoc h2, #guideDoc h3 { page-break-after: avoid; }

  @media (max-width: 600px) {
    .msg { max-width: 90%; }
    .doc-head, .doc-foot { padding-left: 22px; padding-right: 22px; margin-left: 0; margin-right: 0; }
    .doc-body { padding: 24px 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="kicker">Stop the Starving Artist</div>
      <h1>Build Your Personal Brand Guide</h1>
    </div>
    <div class="hdr-btns">
      <button id="backBtn" type="button" disabled>← Back</button>
      <button id="startOver" type="button">Start over</button>
    </div>
  </header>

  <div id="chat"></div>

  <form id="form">
    <textarea id="input" rows="1" placeholder="Type your answer…" autocomplete="off"></textarea>
    <button id="send" type="submit">Send</button>
  </form>
</div>

<!-- Guide overlay -->
<div id="guideView">
  <div id="guideCard">
    <div class="guideBar">
      <span>Your Personal Brand Guide</span>
      <div class="acts">
        <button class="ghost" id="closeGuide" type="button">Back to chat</button>
        <button class="primary" id="downloadPdf" type="button">Download PDF</button>
      </div>
    </div>
    <!-- Everything inside #guideDoc gets captured in the PDF -->
    <div id="guideDoc">
      <div class="doc-head">
        <span class="brand">Stop the Starving Artist</span>
        <span class="tag">Personal Brand Guide</span>
      </div>
      <div class="doc-body" id="guideBody"></div>
      <div class="doc-foot">Stop the Starving Artist &nbsp;·&nbsp; Make Your Art More Valuable</div>
    </div>
  </div>
</div>

<script>
  const chat = document.getElementById("chat");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const guideView = document.getElementById("guideView");
  const guideBody = document.getElementById("guideBody");
  const backBtn = document.getElementById("backBtn");

  let messages = [];
  let busy = false;
  let artistName = "Your";
  let guideBuilt = false;

  // The Back button is available during the interview once they're past Q1,
  // and not while the bot is thinking or after the guide is built.
  function updateControls() {
    backBtn.disabled = busy || guideBuilt || messages.length < 4;
  }

  // Rebuild the visible chat from the messages array (used after Back).
  function rebuildChat() {
    chat.innerHTML = "";
    for (let i = 1; i < messages.length; i++) {
      const m = messages[i];
      if (m.role === "user") {
        if (m.content === "Please build my guide now.") continue; // hidden helper turn
        addBubble(m.content, "user");
      } else {
        addBubble(m.content, "bot");
      }
    }
  }

  // Step back one question and let them re-answer it (their old answer is pre-filled).
  function goBack() {
    if (busy || guideBuilt || messages.length < 4) return;
    messages.pop();                 // remove the current question
    const prevAnswer = messages.pop(); // remove their last answer
    rebuildChat();
    if (prevAnswer && typeof prevAnswer.content === "string") {
      input.value = prevAnswer.content;
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 140) + "px";
    }
    updateControls();
    input.focus();
  }

  const START_MARK = "<<<BRAND_GUIDE_START>>>";
  const END_MARK = "<<<BRAND_GUIDE_END>>>";
  const BUILDING_MARK = "<<<BUILDING_GUIDE>>>";

  // Safety net: strip any stray markdown so chat bubbles never show raw * or #.
  function cleanChat(t) {
    return t
      .replace(/\*\*(.*?)\*\*/g, "$1")
      .replace(/\*(.*?)\*/g, "$1")
      .replace(/^#{1,6}\s+/gm, "")
      .replace(/^\s*[-•]\s+/gm, "")
      .trim();
  }

  function addBubble(text, who) {
    const div = document.createElement("div");
    div.className = "msg " + who;
    div.textContent = who === "bot" ? cleanChat(text) : text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function setBusy(state) {
    busy = state;
    sendBtn.disabled = state;
    input.disabled = state;
    updateControls();
  }

  async function callApi() {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || "Something went wrong. Please try again.");
    }
    const data = await res.json();
    return data.reply || "";
  }

  function renderGuide(md) {
    const nameMatch = md.match(/^#\s*(.+?)'s Personal Brand Guide/m);
    if (nameMatch) artistName = nameMatch[1].trim();
    guideBody.innerHTML = marked.parse(md);
    const wrap = document.createElement("div");
    wrap.className = "msg notice";
    const btn = document.createElement("button");
    btn.textContent = "Open my Personal Brand Guide";
    btn.onclick = () => { guideView.style.display = "flex"; };
    wrap.appendChild(btn);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    guideView.style.display = "flex"; // pop it open automatically
    guideBuilt = true;
    updateControls();
  }

  // Core turn handler. Handles the building-message handoff and the guide.
  async function turn(userText, displayUser) {
    if (busy) return;
    if (displayUser && userText) addBubble(userText, "user");
    if (userText) messages.push({ role: "user", content: userText });

    setBusy(true);
    let typing = addTyping();
    try {
      const reply = await callApi();
      messages.push({ role: "assistant", content: reply });

      // Case 1: the bot says it's building the guide.
      if (reply.includes(BUILDING_MARK)) {
        const msg = reply.replace(BUILDING_MARK, "").trim();
        typing.remove();
        addBubble(msg, "bot");
        typing = addTyping(); // keep dots up while we generate the guide
        messages.push({ role: "user", content: "Please build my guide now." });
        const guideReply = await callApi();
        messages.push({ role: "assistant", content: guideReply });
        typing.remove();
        const s = guideReply.indexOf(START_MARK), e = guideReply.indexOf(END_MARK);
        if (s !== -1 && e !== -1) {
          renderGuide(guideReply.slice(s + START_MARK.length, e).trim());
          addBubble("Your guide is ready 🙂 Tap the button above anytime to view or download it.", "bot");
        } else {
          addBubble(guideReply, "bot");
        }
        return;
      }

      // Case 2: a guide arrived directly in this reply.
      const s = reply.indexOf(START_MARK), e = reply.indexOf(END_MARK);
      if (s !== -1 && e !== -1) {
        typing.remove();
        const before = reply.slice(0, s).trim();
        if (before) addBubble(before, "bot");
        renderGuide(reply.slice(s + START_MARK.length, e).trim());
        return;
      }

      // Case 3: a normal conversational message.
      typing.remove();
      addBubble(reply, "bot");
    } catch (err) {
      typing.remove();
      addBubble("Hmm, something hiccupped on my end. Mind trying that again? (" + err.message + ")", "bot");
    } finally {
      setBusy(false);
      input.focus();
    }
  }

  function start() {
    messages = [];
    chat.innerHTML = "";
    guideView.style.display = "none";
    guideBody.innerHTML = "";
    artistName = "Your";
    guideBuilt = false;
    updateControls();
    turn("Hi! I'm ready to start.", false);
  }

  window.addEventListener("load", start);

  document.getElementById("startOver").onclick = () => {
    if (busy) return;
    start();
  };

  backBtn.onclick = goBack;

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text || busy) return;
    input.value = "";
    input.style.height = "auto";
    turn(text, true);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  });

  document.getElementById("closeGuide").onclick = () => { guideView.style.display = "none"; };
  document.getElementById("downloadPdf").onclick = () => {
    const name = artistName.replace(/[^a-z0-9]+/gi, "-");
    html2pdf().set({
      margin: 0,
      filename: name + "-Personal-Brand-Guide.pdf",
      image: { type: "jpeg", quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
      pagebreak: { mode: ["css", "legacy"] },
    }).from(document.getElementById("guideDoc")).save();
  };
</script>
</body>
</html>
